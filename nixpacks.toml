# nixpacks.toml — RenomBot · SIS
# Fix: PATH correcto usando /opt/venv/bin explícito en el start command.
# Las variables B2_* se inyectan en runtime por Railway (Variables panel).
# Este archivo solo controla el BUILD, no el runtime.

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --no-cache-dir -r requirements.txt"
]

# NO [start] section here: railway.json startCommand takes absolute precedence.
# Having both causes undefined behavior in some Nixpacks versions.
