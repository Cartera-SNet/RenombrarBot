# Este workflow está desactivado intencionalmente.
# Railway hace el deploy automático al detectar cambios en main.
# Configurar en: railway.app → tu proyecto → Settings → Source Repo
#
# Si necesitas forzar un redeploy manual: Railway → tu servicio → Deploy → Redeploy
name: CI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask boto3 botocore

      - name: Syntax check
        run: python -m py_compile app.py && echo "✓ app.py sintaxis OK"
