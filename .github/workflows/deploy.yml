name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:   # permite desplegar manualmente desde GitHub Actions

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railway-dev/railway-action@v2
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          environment: production
